<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Landing Page</title>

    <!-- Tracking Script -->
    <script src="http://localhost:3000/sdk.js?cid=cli_vtQ7zUMEFJA" async></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .explore-btn {
            display: inline-block;
            background: white;
            color: #4f46e5;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .explore-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Accelerate Your Growth with AI</h1>

        <p>
            Discover innovative AI-powered solutions designed to optimize your marketing,
            automate workflows, and drive business growth.
        </p>

        <a href="https://growthsynth.com/"
           class="explore-btn"
           target="_blank"
           rel="noopener noreferrer">
            Explore More
        </a>
    </div>

</body>
</html>
